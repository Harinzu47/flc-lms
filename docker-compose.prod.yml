services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: flc-lms-prod:latest
    container_name: flc-lms-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - storage-data:/var/www/html/storage

  worker:
    image: flc-lms-prod:latest
    container_name: flc-lms-worker
    restart: unless-stopped
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    env_file:
      - .env
    depends_on:
      - redis
      - web
    volumes:
      - storage-data:/var/www/html/storage

  scheduler:
    image: flc-lms-prod:latest
    container_name: flc-lms-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    env_file:
      - .env
    depends_on:
      - redis
      - web
    volumes:
      - storage-data:/var/www/html/storage

  redis:
    image: redis:alpine
    container_name: flc-lms-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  storage-data:
  redis-data:
