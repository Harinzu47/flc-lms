# HTTP - redirect semua ke HTTPS
server {

    listen 80;

    server_name hzcode.my.id www.hzcode.my.id;

    return 301 https://$host$request_uri;

}

# HTTPS
server {

    listen 443 ssl;

    http2 on;

    server_name hzcode.my.id www.hzcode.my.id;

    ssl_certificate /etc/letsencrypt/live/hzcode.my.id/fullchain.pem;

    ssl_certificate_key /etc/letsencrypt/live/hzcode.my.id/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    ssl_prefer_server_ciphers off;

    root /var/www/html/public;

    index index.php;

    charset utf-8;

    client_max_body_size 100M;

    add_header X-Frame-Options "SAMEORIGIN" always;

    add_header X-Content-Type-Options "nosniff" always;

    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {

        try_files $uri $uri/ /index.php?$query_string;

    }

    location ~ \.php$ {

        # Wajib ada: mencegah request semacam
        # /storage/foo.jpg/x.php dieksekusi sebagai PHP (PATH_INFO exploit)
        try_files $uri =404;

        include fastcgi_params;

        fastcgi_pass app:9000;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        fastcgi_read_timeout 300;

    }

    location ~* \.(css|js|jpg|jpeg|png|gif|svg|woff2?)$ {

        # Fallback ke index.php kalau file fisiknya nggak ada.
        # Wajib ada: Livewire nge-serve livewire.min.js secara dinamis
        # lewat route Laravel, bukan file statis, jadi tanpa fallback
        # ini nginx bakal 404 duluan sebelum sempat ke PHP-FPM.
        try_files $uri /index.php?$query_string;

        expires 30d;

        access_log off;

    }

    location ~ /\. {

        deny all;

    }

}